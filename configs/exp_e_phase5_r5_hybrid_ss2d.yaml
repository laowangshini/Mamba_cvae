# Phase 5 R5: Final push — R4 config + higher LPIPS weight to recover perceptual quality
# R4: CLIP=25.84@cfg2 (new best!), LPIPS=0.210 (slightly over 0.20 target)
# R5: lambda_lpips=1.5 to tighten reconstruction quality
experiment:
  name: "exp_e_phase5_r5_hybrid_ss2d"
  description: "Phase5 R5: inject=3, dropout=0.25, lpips=1.5 (final push)"
model:
  block_type: "ss2d"
  latent_dim: 128
  cond_mode: "clip_hybrid"
  cond_dim: 0
  cond_embed_dim: 256
  clip_text_dim: 512
  clip_seq_len: 77
  clip_cache_pt: "data/celeba/celeba_clip_text_vitb32.pt"
  mapper_bidirectional: true
  attn_heads: 4
  bottleneck_inject_stages: 3
train:
  batch_size: 64
  lr: 0.0002
  epochs: 20
  img_size: 64
  kld_weight: 0.005
  lambda_lpips: 1.5
  cond_dropout_prob: 0.25
