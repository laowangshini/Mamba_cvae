# Phase 3.5（1.txt）：Sweet Spot 搜索（4x4 + 8x8 两个 stage 注入）
#
# 仅改动：bottleneck_inject_stages: 2

experiment:
  name: "exp_c_phase3_clip_hybrid_v3_ss2d"
  description: "Phase3.5: sweet spot search (bottleneck_inject_stages=2)"

model:
  block_type: "ss2d"
  latent_dim: 128
  cond_mode: "clip_hybrid"
  cond_dim: 0
  cond_embed_dim: 256
  clip_text_dim: 512
  clip_seq_len: 77
  clip_cache_pt: "data/celeba/celeba_clip_text_vitb32.pt"
  mapper_bidirectional: true
  attn_heads: 4
  bottleneck_inject_stages: 2

train:
  batch_size: 64
  lr: 0.0001
  epochs: 20
  img_size: 64

