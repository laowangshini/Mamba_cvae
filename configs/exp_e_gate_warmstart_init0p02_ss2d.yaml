# Ablation A.2（论文方法）：门控热启动 gate_init=0.02
# 用途：与 gate_init=0.0 对照，证明 0.02 warm-start 能立即激活门控梯度
experiment:
  name: "exp_e_gate_warmstart_init0p02"
  description: "Ablation: GatedHybridCrossAttn with gate_init=0.02 (warm-start, ours)"

model:
  block_type: "ss2d"
  latent_dim: 128
  cond_mode: "clip_hybrid"
  cond_dim: 0
  cond_embed_dim: 256
  clip_text_dim: 512
  clip_seq_len: 77
  clip_cache_pt: "data/celeba/celeba_clip_text_vitb32.pt"
  mapper_bidirectional: true
  attn_heads: 4
  bottleneck_inject_stages: 1
  gate_init: 0.02

train:
  batch_size: 64
  lr: 0.0001
  epochs: 3
  img_size: 64
  kld_weight: 1.0
  lambda_lpips: 0.0
  cond_dropout_prob: 0.0
  gate_grad_log: true
