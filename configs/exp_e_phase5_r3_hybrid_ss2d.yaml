# Phase 5 R3: Lower KLD for more conditioning capacity
experiment:
  name: "exp_e_phase5_r3_hybrid_ss2d"
  description: "Phase5 R3: kld=0.001, lpips=1.0, inject=2, dropout=0.2"
model:
  block_type: "ss2d"
  latent_dim: 128
  cond_mode: "clip_hybrid"
  cond_dim: 0
  cond_embed_dim: 256
  clip_text_dim: 512
  clip_seq_len: 77
  clip_cache_pt: "data/celeba/celeba_clip_text_vitb32.pt"
  mapper_bidirectional: true
  attn_heads: 4
  bottleneck_inject_stages: 2
train:
  batch_size: 64
  lr: 0.0002
  epochs: 20
  img_size: 64
  kld_weight: 0.001
  lambda_lpips: 1.0
  cond_dropout_prob: 0.2
