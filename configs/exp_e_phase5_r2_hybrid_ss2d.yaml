# Phase 5 Round 2: Expand Cross-Attn to 2 stages (4x4 + 8x8)
# R1: LPIPS=0.192, CLIP=25.31@cfg2 — inject_stages=1 only at bottleneck
# R2: inject_stages=2 to strengthen text-image alignment at two resolution levels

experiment:
  name: "exp_e_phase5_r2_hybrid_ss2d"
  description: "Phase5 R2: inject_stages=2, gate=0.02, L1+LPIPS=1.0"

model:
  block_type: "ss2d"
  latent_dim: 128
  cond_mode: "clip_hybrid"
  cond_dim: 0
  cond_embed_dim: 256
  clip_text_dim: 512
  clip_seq_len: 77
  clip_cache_pt: "data/celeba/celeba_clip_text_vitb32.pt"
  mapper_bidirectional: true
  attn_heads: 4
  bottleneck_inject_stages: 2

train:
  batch_size: 64
  lr: 0.0002
  epochs: 20
  img_size: 64
  kld_weight: 0.005
  lambda_lpips: 1.0
  cond_dropout_prob: 0.15
